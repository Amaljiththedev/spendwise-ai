data:
  required_columns:
    - Date
    - Description
    - Category
    - Amount
    - Type
  date_column: Date
  amount_column: Amount
  description_column: Description
  category_column: Category
  type_column: Type
  encoding: utf-8
  expense_label: Expense
  income_label: Income

  cleaning:
    date_format: "%Y-%m-%d"
    derived_columns:
      month: month
      year: year
      day_of_week: day_of_week
      month_number: month_number
      category_encoded: category_encoded
  ml:
    features: ["Amount", "month_number", "day_of_month", "day_of_week_num", "cat_*"]
    contamination: 0.03
    random_state: 42
    per_category:
      enabled: false
      min_category_size: 30


analytics:
  top_n_categories: 3
  trend_months: 3