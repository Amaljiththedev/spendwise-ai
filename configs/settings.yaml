data:
  required_columns:
    - Date
    - Transaction Description
    - Category
    - Amount
    - Type
  date_column: Date
  amount_column: Amount
  description_column: Transaction Description
  category_column: Category
  type_column: Type
  encoding: utf-8
  expense_label: Expense
  income_label: Income

  cleaning:
    date_format: "%Y-%m-%d"
    derived_columns:
      month: month
      year: year
      day_of_week: day_of_week
      month_number: month_number
      category_encoded: category_encoded
  ml:
    features: ["Amount", "month_number", "category_encoded"]
    contamination: 0.05
    random_state: 42


analytics:
  top_n_categories: 3
  trend_months: 3